<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>MTR 列車實時物理模擬系統 - 管理後台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #121418; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #1e222b; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        h1 { color: #E2231A; }
        .stat-grid { display: flex; gap: 20px; margin-top: 15px; }
        .stat-box { background: #2a2f3a; padding: 15px; border-radius: 6px; flex: 1; text-align: center; }
        .stat-val { font-size: 24px; font-weight: bold; color: #ffca28; }
        a.btn { display: inline-block; padding: 10px 15px; background: #E2231A; color: white; text-decoration: none; border-radius: 5px; margin-top: 15px; }
    </style>
</head>
<body>
    <h1><i class="fa-solid fa-gauge-high"></i> MTR 實時監控與數據歸檔系統</h1>
    <div class="card">
        <h2>荃灣線 (TWL) 當前狀態</h2>
        <div class="stat-grid">
            <div class="stat-box"><div>上行運行中列車</div><div class="stat-val" id="up-count">-</div></div>
            <div class="stat-box"><div>下行運行中列車</div><div class="stat-val" id="down-count">-</div></div>
            <div class="stat-box"><div>本日最高用車量</div><div class="stat-val" id="peak-count">-</div></div>
        </div>
        <a href="/map" class="btn"><i class="fa-solid fa-map"></i> 切換至實時地圖</a>
    </div>

    <script>
        function fetchDashboard() {
            fetch('/api/admin/dashboard?line=TWL')
                .then(r => r.json())
                .then(d => {
                    document.getElementById('up-count').innerText = d.up_running;
                    document.getElementById('down-count').innerText = d.down_running;
                    document.getElementById('peak-count').innerText = d.peak_use_today;
                });
        }
        fetchDashboard();
        setInterval(fetchDashboard, 3000);
    </script>
</body>
</html>
