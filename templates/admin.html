<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>MTR 列車實時位置顯示系統 - 數據後台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #12131a; 
            color: #e2e8f0; 
        }

        /* 🎯 統一導航欄黃金 CSS (與 map.html 完完全全一模一樣) */
        header { 
            background: #1e222b; 
            color: #fff;
            padding: 0 20px; 
            height: 56px; /* 強制固定高度 */
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid #E2231A; 
            z-index: 1000; 
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        .nav-title { 
            font-size: 16px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            white-space: nowrap; /* 防止換行 */
            overflow: hidden;
            text-overflow: ellipsis; /* 螢幕過窄時自動縮略 */
            margin-right: 15px;
        }
        .btn-nav { 
            background: #E2231A; 
            color: white; 
            text-decoration: none; 
            padding: 0 14px; 
            height: 34px; /* 按鈕高度固定 */
            border-radius: 4px; 
            font-size: 13px; 
            font-weight: bold;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            box-sizing: border-box;
        }
        .btn-nav:hover { background: #b91c1c; }

        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }

        .stats-card {
            background: #1e222b;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2d3139;
        }
        .stats-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #fff;
            border-left: 4px solid #E2231A;
            padding-left: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .stat-box {
            background: #15181f;
            border-radius: 6px;
            padding: 12px 5px;
            text-align: center;
            border: 1px solid #2a2e37;
        }
        .stat-label { font-size: 11px; color: #a0aec0; margin-bottom: 6px; line-height: 1.3; }
        .stat-value { font-size: 20px; font-weight: bold; color: #f59e0b; }

        .monitor-table {
            width: 100%;
            border-collapse: collapse;
            background: #1e222b;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2d3139;
            margin-bottom: 40px;
        }
        
        .row-station {
            background: #1e222b;
            border-bottom: 1px solid #2a2e37;
        }
        .row-interval {
            background: #171a21;
            border-bottom: 1px solid #2a2e37;
        }

        .monitor-table td {
            padding: 10px 15px;
            vertical-align: middle;
        }

        .station-info {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .station-name {
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
        }
        .station-code {
            font-size: 11px;
            color: #718096;
            font-weight: 500;
        }

        .interval-text {
            font-size: 12px;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .train-col {
            width: 60px;
            text-align: center;
        }

        .mtr-train-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #1a202c;
            border: 2px solid #a0aec0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 6px rgba(0,0,0,0.5);
            animation: pulse 1.5s infinite ease-in-out;
        }
        .mtr-train-icon::before {
            content: '';
            width: 14px;
            height: 8px;
            background: #e2231a; 
            border-radius: 3px 3px 0 0;
            position: absolute;
            top: 3px;
        }
        .mtr-train-icon::after {
            content: '';
            width: 8px;
            height: 3px;
            background: #63b3ed; 
            position: absolute;
            top: 5px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.08); opacity: 1; box-shadow: 0 0 10px rgba(226,35,26,0.6); }
            100% { transform: scale(1); opacity: 0.9; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-title">
            <i class="fa-solid fa-chart-simple" style="color: #E2231A;"></i> 📊 MTR 實時數據監控後台
        </div>
        <a href="/" class="btn-nav">
            <i class="fa-solid fa-map-location-dot"></i> 前往實時地圖
        </a>
    </header>

    <div class="container">
        
        <div class="stats-card">
            <div class="stats-title">荃灣線 (TWL) 當前狀態</div>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">上行運行<br>中列車</div>
                    <div class="stat-value" id="val-up">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">下行運行<br>中列車</div>
                    <div class="stat-value" id="val-down">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">本日最高<br>用車量</div>
                    <div class="stat-value" id="val-peak">0</div>
                </div>
            </div>
        </div>

        <table class="monitor-table">
            <tbody id="monitor-body">
                </tbody>
        </table>

    </div>
    <script>
        let currentLine = 'TWL';
        const STATIONS_DICT = {
            'TWL': [
                {code: 'TSW', name: '荃灣'}, {code: 'TWH', name: '大窩口'}, {code: 'KWH', name: '葵興'},
                {code: 'KWF', name: '葵芳'}, {code: 'LAK', name: '荔景'}, {code: 'MEF', name: '美孚'},
                {code: 'LCK', name: '荔枝角'}, {code: 'CSW', name: '長沙灣'}, {code: 'SSP', name: '深水埗'},
                {code: 'PRE', name: '太子'}, {code: 'MOK', name: '旺角'}, {code: 'YMT', name: '油麻地'},
                {code: 'JOR', name: '佐敦'}, {code: 'TST', name: '尖沙咀'}, {code: 'ADM', name: '金鐘'},
                {code: 'CEN', name: '中環'}
            ],
            'TKL': [
                {code: 'POA', name: '寶琳'}, {code: 'HAH', name: '坑口'}, {code: 'TKO', name: '將軍澳'},
                {code: 'LHP', name: '康城'}, {code: 'TIK', name: '調景嶺'}, {code: 'YAT', name: '油塘'},
                {code: 'QUB', name: '鰂魚涌'}, {code: 'NOP', name: '北角'}
            ]
        };

        const ST_NAMES_ZH = {
            "CEN":"中環", "ADM":"金鐘", "TST":"尖沙咀", "JOR":"佐敦", "YMT":"油麻地",
            "MOK":"旺角", "PRE":"太子", "SSP":"深水埗", "CSW":"長沙灣", "LCK":"荔枝角",
            "MEF":"美孚", "LAK":"荔景", "KWF":"葵芳", "KWH":"葵興", "TWH":"大窩口", "TSW":"荃灣"
        };

        // 初始化與切換路線
        function switchLine(lineCode, element) {
            currentLine = lineCode;
            
            // 更新選單外觀
            document.querySelectorAll('.folder-item').forEach(item => {
                item.classList.remove('active');
                item.querySelector('i').className = 'fa-solid fa-folder';
            });
            element.classList.add('active');
            element.querySelector('i').className = 'fa-solid fa-folder-open';

            // 修改變數顏色主題
            const root = document.documentElement;
            root.style.setProperty('--twl-color', lineCode === 'TWL' ? '#E2231A' : '#7A2682');
            
            document.getElementById('current-line-title').innerHTML = `<i class="fa-solid fa-chart-line"></i> ${lineCode === 'TWL' ? '荃灣線' : '將軍澳線'}實時調度狀態`;

            // 更新篩選器中的車站清單
            const stationSelect = document.getElementById('filter-station');
            stationSelect.innerHTML = '<option value="ALL">所有車站 (ALL)</option>';
            STATIONS_DICT[lineCode].forEach(st => {
                stationSelect.innerHTML += `<option value="${st.code}">${st.name} (${st.code})</option>`;
            });

            // 生成今日與過去幾天的日子篩選選項
            const dateSelect = document.getElementById('filter-date');
            dateSelect.innerHTML = '<option value="ALL">任何日子 (ALL)</option>';
            for(let i=0; i<7; i++) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let dateStr = d.toISOString().split('T')[0];
                dateSelect.innerHTML += `<option value="${dateStr}">${dateStr}</option>`;
            }

            renderEmptyKanban();
            updateDashboardData();
            loadLogs();
        }

        // 預先渲染乾淨的直立式看板外殼
        function renderEmptyKanban() {
            const tbody = document.getElementById('kanban-body');
            tbody.innerHTML = '';
            const list = STATIONS_DICT[currentLine];

            for (let i = 0; i < list.length; i++) {
                // 車站行
                tbody.innerHTML += `
                    <tr class="kanban-row-station" id="row-sta-${list[i].code}">
                        <td class="kanban-cell station-name">${list[i].name} <span class="station-code-slug">${list[i].code}</span></td>
                        <td class="kanban-cell" id="cell-sta-${list[i].code}-UP"></td>
                        <td class="kanban-cell" id="cell-sta-${list[i].code}-DOWN"></td>
                    </tr>
                `;
                // 站間區間行
                if (i < list.length - 1) {
                    tbody.innerHTML += `
                        <tr class="kanban-row-inter" id="row-inter-${list[i].code}-${list[i+1].code}">
                            <td class="kanban-cell station-name" style="color:#bbb; font-weight:normal; font-size:12px; padding-left:25px;">↓ 站間區間</td>
                            <td class="kanban-cell" id="cell-inter-${list[i].code}-${list[i+1].code}-UP"></td>
                            <td class="kanban-cell" id="cell-inter-${list[i].code}-${list[i+1].code}-DOWN"></td>
                        </tr>
                    `;
                }
            }
        }

        // 定時向後台獲取列車位置並擺放圖標
        function updateDashboardData() {
            fetch(`/api/admin/dashboard?line=${currentLine}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('stat-up-count').innerText = data.up_running || 0;
                    document.getElementById('stat-down-count').innerText = data.down_running || 0;
                    document.getElementById('stat-peak-count').innerText = data.peak_use_today || 0;

                    // 清空看板上的舊車
                    document.querySelectorAll('[id^="cell-sta-"], [id^="cell-inter-"]').forEach(c => c.innerHTML = '');

                    // 將火車塞入對應的位置
                    var trains = data.active_trains || data.trains || [];
                    trains.forEach(train => {
                        const from_sta = String(train.from || train.from_sta).toUpperCase().trim();
                        const to_sta = String(train.to || train.to_sta).toUpperCase().trim();
                        const direction = String(train.direction).toUpperCase().trim();
                        
                        const destName = ST_NAMES_ZH[train.dest] || train.dest;
                        const iconHtml = `<i class="fa-solid fa-train-subway train-icon" title="終點站: 往 ${destName} | 進度: ${Math.round(train.ratio*100)}%"></i>`;
                        
                        // 🎯 修正1：容錯判定。如果是進站，或者進度已到 85% 以上，直接算作進入 to 車站
                        if (train.status === 'stopped_at_station' || train.ratio >= 0.85) {
                            const cell = document.getElementById(`cell-sta-${to_sta}-${direction}`);
                            if(cell) cell.innerHTML = iconHtml;
                        } else if (train.ratio <= 0.15) {
                            // 剛發車，還在起點站
                            const cell = document.getElementById(`cell-sta-${from_sta}-${direction}`);
                            if(cell) cell.innerHTML = iconHtml;
                        } else {
                            // 🎯 修正2：消除下行站間 ID 鏡像配對盲區
                            let cellId = `cell-inter-${from_sta}-${to_sta}-${direction}`;
                            let cell = document.getElementById(cellId);
                            if(!cell) {
                                cellId = `cell-inter-${to_sta}-${from_sta}-${direction}`;
                                cell = document.getElementById(cellId);
                            }
                            if(cell) cell.innerHTML = iconHtml;
                        }
                    });
                }).catch(err => console.error("後台看板數據更新失敗:", err));
        }

        // 載入與過濾歷史日誌
        function loadLogs() {
            const sta = document.getElementById('filter-station').value;
            const date = document.getElementById('filter-date').value;
            const time = document.getElementById('filter-time').value;

            // 後端日誌路由兼容安全性保護
            fetch(`/api/admin/logs?line=${currentLine}&station=${sta}&date=${date}&time=${time}`)
                .then(res => {
                    if(!res.ok) return [];
                    return res.json();
                })
                .then(logs => {
                    const container = document.getElementById('log-list-container');
                    container.innerHTML = '';
                    
                    if(!logs || logs.length === 0) {
                        container.innerHTML = '<div style="text-align:center; color:#999; padding:20px; font-size:13px;">暫無符合條件的捕捉數據</div>';
                        return;
                    }

                    logs.forEach(log => {
                        const isArr = log.event === 'ARRIVED';
                        const itemClass = isArr ? 'arrived' : 'departed';
                        const eventText = isArr ? '列車進站中 (ttnt=0)' : '列車已開出 (發車)';
                        const dirText = log.direction === 'UP' ? '↑ 上行' : '↓ 下行';
                        const dirClass = log.direction === 'UP' ? 'up' : '';
                        const stationName = ST_NAMES_ZH[log.station] || log.station;
                        const destName = ST_NAMES_ZH[log.dest] || log.dest;

                        container.innerHTML += `
                            <div class="log-item ${itemClass}">
                                <div class="log-main">
                                    <div>
                                        <span class="log-station-tag">${stationName}</span> 
                                        <span style="margin-left:8px; color:${isArr?'green':'#1890ff'}; font-weight:bold;">${eventText}</span>
                                    </div>
                                    <div class="log-dest">終點站: 往 ${destName}</div>
                                    <div class="log-time">${log.timestamp}</div>
                                </div>
                                <span class="log-dir-tag ${dirClass}">${dirText}</span>
                            </div>
                        `;
                    });
                }).catch(() => {
                    // 靜默降級：若日誌存檔功能尚未啟用，不拋出報錯阻斷主程序
                    document.getElementById('log-list-container').innerHTML = '<div style="text-align:center; color:#aaa; padding:20px; font-size:13px;">歷史數據日誌模組常駐監聽中...</div>';
                });
        }

        // 進入頁面自動初始化
        switchLine('TWL', document.querySelector('.folder-item'));
        
        // 建立常駐定時器
        setInterval(updateDashboardData, 1000); // 與雲端引擎步進同步，調高至每 1 秒精準刷新看板車位
        setInterval(loadLogs, 10000);            // 每 10 秒更新一次日誌
    </script>

</body>
</html>
