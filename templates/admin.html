<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>MTR 列車調度與雲端數據後台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --twl-color: #E2231A;
            --tkl-color: #7A2682;
            --bg-color: #f5f7fb;
            --card-bg: #ffffff;
            --text-main: #333333;
        }

        body {
            margin: 0; padding: 0; font-family: "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-main); display: flex; height: 100vh;
        }

        /* 📁 左側文件夾式導覽列 */
        .sidebar {
            width: 260px; background-color: #1e222b; color: #ffffff;
            display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar-header {
            padding: 20px; font-size: 16px; font-weight: bold; background: #15181f;
            border-bottom: 1px solid #2a2f3b; display: flex; align-items: center; gap: 10px;
        }
        .folder-menu { padding: 15px 0; list-style: none; margin: 0; flex: 1; }
        .folder-item { padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; color: #b8c0cc; }
        .folder-item:hover { background: #2a2f3b; color: #fff; }
        .folder-item.active { background: #2a2f3b; color: #fff; border-left: 4px solid var(--twl-color); }
        .folder-item i.fa-folder-open { color: #ffca28; }

        /* 📊 右側主儀表板 */
        .main-content { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .header-title { font-size: 22px; font-weight: bold; margin: 0; display: flex; align-items: center; gap: 10px; }
        
        /* 📈 小統計表區塊 */
        .stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; }
        .stat-card { background: var(--card-bg); padding: 15px 20px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); display: flex; justify-content: space-between; align-items: center; }
        .stat-info .stat-label { font-size: 13px; color: #888; margin-bottom: 5px; }
        .stat-info .stat-value { font-size: 24px; font-weight: bold; }
        .stat-icon { font-size: 28px; opacity: 0.2; }

        /* 🏢 雙欄佈局：左看板，右日誌 */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; align-items: start; }
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }

        .card { background: var(--card-bg); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 20px; }
        .card-title { font-size: 16px; font-weight: bold; margin-top: 0; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        /* 🚆 簡易列車位置看板（完美復刻直立式樣式） */
        .kanban-table { width: 100%; border-collapse: collapse; }
        .kanban-th { background: #f8f9fa; text-align: center; font-size: 12px; color: #666; padding: 8px; border-bottom: 2px solid #eee; }
        .kanban-row-station { background: #ffffff; font-weight: bold; font-size: 14px; color: #333; }
        .kanban-row-inter { background: #fdfdfd; font-size: 11px; color: #999; }
        .kanban-cell { padding: 10px; border-bottom: 1px solid #f0f0f0; text-align: center; position: relative; }
        .kanban-cell.station-name { text-align: left; padding-left: 15px; border-left: 4px solid #ccc; }
        .train-icon { font-size: 18px; color: var(--twl-color); animation: pulse 1.5s infinite ease-in-out; }
        .station-code-slug { font-size: 11px; color: #aaa; font-weight: normal; margin-left: 5px; }

        /* 📡 歷史班次紀錄與高級篩選器 */
        .filter-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .filter-select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; background-color: #fff; font-size: 13px; outline: none; }
        .filter-select:focus { border-color: var(--twl-color); }
        
        .log-list { max-height: 450px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        .log-item { background: #f8f9fa; border-left: 4px solid #52c41a; padding: 12px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .log-item.departed { border-left-color: #1890ff; }
        .log-main { display: flex; flex-direction: column; gap: 3px; }
        .log-time { font-family: monospace; color: #888; font-size: 11px; }
        .log-station-tag { font-weight: bold; color: #222; }
        .log-dir-tag { font-size: 12px; padding: 2px 6px; border-radius: 3px; background: #e6f7ff; color: #1890ff; font-weight: bold; }
        .log-dir-tag.up { background: #f6ffed; color: #52c41a; }
        .log-dest { font-size: 11px; color: #666; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-folder-tree"></i> 港鐵路線文件夾
        </div>
        <ul class="folder-menu">
            <li class="folder-item active" onclick="switchLine('TWL', this)">
                <i class="fa-solid fa-folder-open"></i> <span>荃灣線 (TWL)</span>
            </li>
            <li class="folder-item" onclick="switchLine('TKL', this)">
                <i class="fa-solid fa-folder"></i> <span>將軍澳線 (TKL)</span>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <h2 class="header-title" id="current-line-title">
            <i class="fa-solid fa-chart-line"></i> 荃灣線實時調度狀態
        </h2>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-info">
                    <div class="stat-label">上行在途中列車 (往荃灣/寶琳)</div>
                    <div class="stat-value" id="stat-up-count">0</div>
                </div>
                <i class="fa-solid fa-train-subway stat-icon" style="color: #52c41a;"></i>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <div class="stat-label">下行在途中列車 (往中環/北角)</div>
                    <div class="stat-value" id="stat-down-count">0</div>
                </div>
                <i class="fa-solid fa-train-subway stat-icon" style="color: #1890ff;"></i>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <div class="stat-label">當日最高全線用車量</div>
                    <div class="stat-value" id="stat-peak-count">0</div>
                </div>
                <i class="fa-solid fa-bolt stat-icon" style="color: #faad14;"></i>
            </div>
        </div>

        <div class="dashboard-grid">
            
            <div class="card">
                <div class="card-title"><i class="fa-solid fa-list-ol"></i> 簡易列車位置看板 (實時隊列)</div>
                <table class="kanban-table">
                    <thead>
                        <tr>
                            <th class="kanban-th" style="text-align: left; width: 40%;">車站／區間</th>
                            <th class="kanban-th" style="width: 30%;">上行 (往荃灣)</th>
                            <th class="kanban-th" style="width: 30%;">下行 (往中環)</th>
                        </tr>
                    </thead>
                    <tbody id="kanban-body">
                        </tbody>
                </table>
            </div>

            <div class="card">
                <div class="card-title"><i class="fa-solid fa-clock-rotate-left"></i> 歷史班次開出時間紀錄</div>
                
                <div class="filter-bar">
                    <select class="filter-select" id="filter-station" onchange="loadLogs()">
                        <option value="ALL">所有車站 (ALL)</option>
                    </select>
                    <select class="filter-select" id="filter-date" onchange="loadLogs()">
                        <option value="ALL">任何日子 (ALL)</option>
                    </select>
                    <select class="filter-select" id="filter-time" onchange="loadLogs()">
                        <option value="ALL">任何時段 (ALL)</option>
                        <option value="06:00-09:00">早晨繁忙時間 (06:00-09:00)</option>
                        <option value="09:00-17:00">日間非繁忙 (09:00-17:00)</option>
                        <option value="17:00-20:00">傍晚繁忙時間 (17:00-20:00)</option>
                        <option value="20:00-23:59">晚間夜行時段 (20:00-23:59)</option>
                    </select>
                </div>

                <div class="log-list" id="log-list-container">
                    </div>
            </div>

        </div>
    </div>

    <script>
        let currentLine = 'TWL';
        const STATIONS_DICT = {
            'TWL': [
                {code: 'TSW', name: '荃灣'}, {code: 'TWH', name: '大窩口'}, {code: 'KWH', name: '葵興'},
                {code: 'KWF', name: '葵芳'}, {code: 'LAK', name: '荔景'}, {code: 'MEF', name: '美孚'},
                {code: 'LCK', name: '荔枝角'}, {code: 'CSW', name: '長沙灣'}, {code: 'SSP', name: '深水埗'},
                {code: 'PRE', name: '太子'}, {code: 'MOK', name: '旺角'}, {code: 'YMT', name: '油麻地'},
                {code: 'JOR', name: '佐敦'}, {code: 'TST', name: '尖沙咀'}, {code: 'ADM', name: '金鐘'},
                {code: 'CEN', name: '中環'}
            ],
            'TKL': [
                {code: 'POA', name: '寶琳'}, {code: 'HAH', name: '坑口'}, {code: 'TKO', name: '將軍澳'},
                {code: 'LHP', name: '康城'}, {code: 'TIK', name: '調景嶺'}, {code: 'YAT', name: '油塘'},
                {code: 'QUB', name: '鰂魚涌'}, {code: 'NOP', name: '北角'}
            ]
        };

        // 初始化與切換路線
        function switchLine(lineCode, element) {
            currentLine = lineCode;
            
            // 更新選單外觀
            document.querySelectorAll('.folder-item').forEach(item => {
                item.classList.remove('active');
                item.querySelector('i').className = 'fa-solid fa-folder';
            });
            element.classList.add('active');
            element.querySelector('i').className = 'fa-solid fa-folder-open';

            // 修改變數顏色主題
            const root = document.documentElement;
            root.style.setProperty('--twl-color', lineCode === 'TWL' ? '#E2231A' : '#7A2682');
            
            document.getElementById('current-line-title').innerHTML = `<i class="fa-solid fa-chart-line"></i> ${lineCode === 'TWL' ? '荃灣線' : '將軍澳線'}實時調度狀態`;

            // 更新篩選器中的車站清單
            const stationSelect = document.getElementById('filter-station');
            stationSelect.innerHTML = '<option value="ALL">所有車站 (ALL)</option>';
            STATIONS_DICT[lineCode].forEach(st => {
                stationSelect.innerHTML += `<option value="${st.code}">${st.name} (${st.code})</option>`;
            });

            // 生成今日與過去幾天的日子篩選選項
            const dateSelect = document.getElementById('filter-date');
            dateSelect.innerHTML = '<option value="ALL">任何日子 (ALL)</option>';
            for(let i=0; i<7; i++) {
                let d = new Date(); d.setDate(d.getDate() - i);
                let dateStr = d.toISOString().split('T')[0];
                dateSelect.innerHTML += `<option value="${dateStr}">${dateStr}</option>`;
            }

            renderEmptyKanban();
            updateDashboardData();
            loadLogs();
        }

        // 預先渲染乾淨的直立式看板外殼
        function renderEmptyKanban() {
            const tbody = document.getElementById('kanban-body');
            tbody.innerHTML = '';
            const list = STATIONS_DICT[currentLine];

            for (let i = 0; i < list.length; i++) {
                // 車站行
                tbody.innerHTML += `
                    <tr class="kanban-row-station" id="row-sta-${list[i].code}">
                        <td class="kanban-cell station-name">${list[i].name} <span class="station-code-slug">${list[i].code}</span></td>
                        <td class="kanban-cell" id="cell-sta-${list[i].code}-UP"></td>
                        <td class="kanban-cell" id="cell-sta-${list[i].code}-DOWN"></td>
                    </tr>
                `;
                // 站間區間行 (最後一站下面沒有區間)
                if (i < list.length - 1) {
                    tbody.innerHTML += `
                        <tr class="kanban-row-inter" id="row-inter-${list[i].code}-${list[i+1].code}">
                            <td class="kanban-cell station-name" style="color:#bbb; font-weight:normal; font-size:12px; padding-left:25px;">↓ 站間區間</td>
                            <td class="kanban-cell" id="cell-inter-${list[i].code}-${list[i+1].code}-UP"></td>
                            <td class="kanban-cell" id="cell-inter-${list[i].code}-${list[i+1].code}-DOWN"></td>
                        </tr>
                    `;
                }
            }
        }

        // 定時向後台獲取列車位置並擺放圖標
        function updateDashboardData() {
            fetch(`/api/admin/dashboard?line=${currentLine}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('stat-up-count').innerText = data.up_running;
                    document.getElementById('stat-down-count').innerText = data.down_running;
                    document.getElementById('stat-peak-count').innerText = data.peak_use_today;

                    // 清空看板上的舊車
                    document.querySelectorAll('[id^="cell-sta-"], [id^="cell-inter-"]').forEach(c => c.innerHTML = '');

                    // 將火車塞入對應的位置
                    data.active_trains.forEach(train => {
                        const iconHtml = `<i class="fa-solid fa-train-subway train-icon" title="${train.id} - 進度:${Math.round(train.ratio*100)}%"></i>`;
                        
                        if (train.status === 'arrived' || train.ratio >= 0.95) {
                            // 擺在 to 車站
                            const cell = document.getElementById(`cell-sta-${train.to}-${train.direction}`);
                            if(cell) cell.innerHTML = iconHtml;
                        } else if (train.ratio <= 0.05) {
                            // 擺在 from 車站
                            const cell = document.getElementById(`cell-sta-${train.from}-${train.direction}`);
                            if(cell) cell.innerHTML = iconHtml;
                        } else {
                            // 擺在區間行
                            // 荃灣線往下走(UP)是從 CEN往TSW，所以 index 順序需要匹配
                            let cellId = `cell-inter-${train.from}-${train.to}-${train.direction}`;
                            let cell = document.getElementById(cellId);
                            if(!cell) {
                                // 容錯：反向排序區間
                                cellId = `cell-inter-${train.to}-${train.from}-${train.direction}`;
                                cell = document.getElementById(cellId);
                            }
                            if(cell) cell.innerHTML = iconHtml;
                        }
                    });
                });
        }

        // 載入與過濾歷史日誌
        function loadLogs() {
            const sta = document.getElementById('filter-station').value;
            const date = document.getElementById('filter-date').value;
            const time = document.getElementById('filter-time').value;

            fetch(`/api/admin/logs?line=${currentLine}&station=${sta}&date=${date}&time=${time}`)
                .then(res => res.json())
                .then(logs => {
                    const container = document.getElementById('log-list-container');
                    container.innerHTML = '';
                    
                    if(logs.length === 0) {
                        container.innerHTML = '<div style="text-align:center; color:#999; padding:20px; font-size:13px;">暫無符合條件的捕捉數據</div>';
                        return;
                    }

                    logs.forEach(log => {
                        const isArr = log.event === 'ARRIVED';
                        const itemClass = isArr ? 'arrived' : 'departed';
                        const eventText = isArr ? '列車進站中 (ttnt=0)' : '列車已開出 (發車)';
                        const dirText = log.direction === 'UP' ? '↑ 上行' : '↓ 下行';
                        const dirClass = log.direction === 'UP' ? 'up' : '';

                        container.innerHTML += `
                            <div class="log-item ${itemClass}">
                                <div class="log-main">
                                    <div>
                                        <span class="log-station-tag">${log.station}</span> 
                                        <span style="margin-left:8px; color:${isArr?'green':'#1890ff'}; font-weight:bold;">${eventText}</span>
                                    </div>
                                    <div class="log-dest">終點站: ${log.dest || '未知'}</div>
                                    <div class="log-time">${log.timestamp}</div>
                                </div>
                                <span class="log-dir-tag ${dirClass}">${dirText}</span>
                            </div>
                        `;
                    });
                });
        }

        // 進入頁面自動初始化
        switchLine('TWL', document.querySelector('.folder-item'));
        
        // 建立常駐定時器
        setInterval(updateDashboardData, 2000); // 每2秒刷新一次直立式看板車位
        setInterval(loadLogs, 6000);             // 每6秒同步一次日誌
    </script>
</body>
</html>
