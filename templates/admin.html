<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>MTR 列車實時位置顯示系統 - 數據後台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #12131a; 
            color: #e2e8f0; 
        }

        /* 🎯 統一導航欄黃金 CSS (與 map.html 完完全全一模一樣) */
        header { 
            background: #1e222b; 
            color: #fff;
            padding: 0 20px; 
            height: 56px; /* 強制固定高度 */
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid #E2231A; 
            z-index: 1000; 
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
        .nav-title { 
            font-size: 16px; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            white-space: nowrap; /* 防止換行 */
            overflow: hidden;
            text-overflow: ellipsis; /* 螢幕過窄時自動縮略 */
            margin-right: 15px;
        }
        .btn-nav { 
            background: #E2231A; 
            color: white; 
            text-decoration: none; 
            padding: 0 14px; 
            height: 34px; /* 按鈕高度固定 */
            border-radius: 4px; 
            font-size: 13px; 
            font-weight: bold;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            box-sizing: border-box;
        }
        .btn-nav:hover { background: #b91c1c; }

        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; }

        .stats-card {
            background: #1e222b;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2d3139;
        }
        .stats-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #fff;
            border-left: 4px solid #E2231A;
            padding-left: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .stat-box {
            background: #15181f;
            border-radius: 6px;
            padding: 12px 5px;
            text-align: center;
            border: 1px solid #2a2e37;
        }
        .stat-label { font-size: 11px; color: #a0aec0; margin-bottom: 6px; line-height: 1.3; }
        .stat-value { font-size: 20px; font-weight: bold; color: #f59e0b; }

        .monitor-table {
            width: 100%;
            border-collapse: collapse;
            background: #1e222b;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2d3139;
            margin-bottom: 40px;
        }
        
        .row-station {
            background: #1e222b;
            border-bottom: 1px solid #2a2e37;
        }
        .row-interval {
            background: #171a21;
            border-bottom: 1px solid #2a2e37;
        }

        .monitor-table td {
            padding: 10px 15px;
            vertical-align: middle;
        }

        .station-info {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .station-name {
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
        }
        .station-code {
            font-size: 11px;
            color: #718096;
            font-weight: 500;
        }

        .interval-text {
            font-size: 12px;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .train-col {
            width: 60px;
            text-align: center;
        }

        .mtr-train-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #1a202c;
            border: 2px solid #a0aec0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 6px rgba(0,0,0,0.5);
            animation: pulse 1.5s infinite ease-in-out;
        }
        .mtr-train-icon::before {
            content: '';
            width: 14px;
            height: 8px;
            background: #e2231a; 
            border-radius: 3px 3px 0 0;
            position: absolute;
            top: 3px;
        }
        .mtr-train-icon::after {
            content: '';
            width: 8px;
            height: 3px;
            background: #63b3ed; 
            position: absolute;
            top: 5px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.08); opacity: 1; box-shadow: 0 0 10px rgba(226,35,26,0.6); }
            100% { transform: scale(1); opacity: 0.9; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-title">
            <i class="fa-solid fa-chart-simple" style="color: #E2231A;"></i> 📊 MTR 實時數據監控後台
        </div>
        <a href="/" class="btn-nav">
            <i class="fa-solid fa-map-location-dot"></i> 前往實時地圖
        </a>
    </header>

    <div class="container">
        
        <div class="stats-card">
            <div class="stats-title">荃灣線 (TWL) 當前狀態</div>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">上行運行<br>中列車</div>
                    <div class="stat-value" id="val-up">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">下行運行<br>中列車</div>
                    <div class="stat-value" id="val-down">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">本日最高<br>用車量</div>
                    <div class="stat-value" id="val-peak">0</div>
                </div>
            </div>
        </div>

        <table class="monitor-table">
            <tbody id="monitor-body">
                </tbody>
        </table>

    </div>

    <script>
        const TWL_STATIONS_ORDER = [
            { code: "TSW", name: "荃灣" },
            { code: "TWH", name: "大窩口" },
            { code: "KWH", name: "葵興" },
            { code: "KWF", name: "葵芳" },
            { code: "LAK", name: "荔景" },
            { code: "MEF", name: "美孚" },
            { code: "LCK", name: "荔枝角" },
            { code: "CSW", name: "長沙灣" },
            { code: "SSP", name: "深水埗" },
            { code: "PRE", name: "太子" },
            { code: "MOK", name: "旺角" },
            { code: "YMT", name: "油麻地" },
            { code: "JOR", name: "佐敦" },
            { code: "TST", name: "尖沙咀" },
            { code: "ADM", name: "金鐘" },
            { code: "CEN", name: "中環" }
        ];

        function buildTableStructure() {
            const tbody = document.getElementById("monitor-body");
            tbody.innerHTML = "";

            for (let i = 0; i < TWL_STATIONS_ORDER.length; i++) {
                const st = TWL_STATIONS_ORDER[i];

                const trStation = document.createElement("tr");
                trStation.className = "row-station";
                trStation.id = `row-st-${st.code}`;
                trStation.innerHTML = `
                    <td>
                        <div class="station-info">
                            <span class="station-name">${st.name}</span>
                            <span class="station-code">${st.code}</span>
                        </div>
                    </td>
                    <td class="train-col" id="td-st-${st.code}-UP"></td>
                    <td class="train-col" id="td-st-${st.code}-DOWN"></td>
                `;
                tbody.appendChild(trStation);

                if (i < TWL_STATIONS_ORDER.length - 1) {
                    const nextSt = TWL_STATIONS_ORDER[i + 1];
                    const trInterval = document.createElement("tr");
                    trInterval.className = "row-interval";
                    
                    trInterval.innerHTML = `
                        <td>
                            <div class="interval-text">
                                <i class="fa-solid fa-arrows-up-down"></i> 站間區間
                            </div>
                        </td>
                        <td class="train-col" id="td-int-${st.code}_${nextSt.code}-UP"></td>
                        <td class="train-col" id="td-int-${st.code}_${nextSt.code}-DOWN"></td>
                    `;
                    tbody.appendChild(trInterval);
                }
            }
        }

                function updateDashboard() {
            fetch('/api/admin/dashboard?line=TWL')
                .then(r => r.json())
                .then(data => {
                    document.getElementById("val-up").innerText = data.up_running;
                    document.getElementById("val-down").innerText = data.down_running;
                    document.getElementById("val-peak").innerText = data.peak_use_today;

                    // 先清空所有格子的火車
                    document.querySelectorAll(".train-col").forEach(td => td.innerHTML = "");

                    data.active_trains.forEach(t => {
                        const from = t.from;
                        const to = t.to;
                        const dir = t.direction;
                        const status = t.status;

                        let targetTdId = "";

                        // 🎯 修正核心：更寬鬆的判斷。如果是停站，或者進行已經快到了(>0.8)，算作在車站內
                        if (status === "stopped_at_station" || t.ratio >= 0.8) {
                            targetTdId = `td-st-${to}-${dir}`;
                        } else {
                            // 否則，一律算在站與站之間的「區間」
                            let element = document.getElementById(`td-int-${from}_${to}-${dir}`);
                            if (!element) {
                                element = document.getElementById(`td-int-${to}_${from}-${dir}`);
                            }
                            if (element) {
                                targetTdId = element.id;
                            } else {
                                // 備用安全網：如果找不到區間，先放在起點站格子內
                                targetTdId = `td-st-${from}-${dir}`;
                            }
                        }

                        if (targetTdId) {
                            const cell = document.getElementById(targetTdId);
                            if (cell) {
                                // 構建帶有目的地提示的火車圖標
                                cell.innerHTML = `<div class="mtr-train-icon" title="往 ${t.dest}"></div>`;
                            }
                        }
                    });
                })
                .catch(err => console.error("抓取後台數據失敗:", err));
        }


        buildTableStructure();
        updateDashboard();
        setInterval(updateDashboard, 1500);
    </script>
</body>
</html>
